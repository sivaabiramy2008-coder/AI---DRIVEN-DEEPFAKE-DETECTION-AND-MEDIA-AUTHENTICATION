<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Media - DeepfakeGuard AI</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>DeepfakeGuard</h2>

        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="upload.html">Upload Media</a>
        <a href="analysis.html">Analysis</a>
        <a href="results.html">Results</a>
        <a href="reports.html">Reports</a>
        <a href="analytics.html">Analytics</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
        <a href="login.html" class="logout">Logout</a>

    </div>

    <!-- Main -->
    <div class="main">

        <h1>Upload Media</h1>
        <p>Upload Image / Video for Deepfake Analysis</p>

        <!-- Upload Area -->
        <div class="upload-area">

            <div class="drop-box">

                <p>📂 Drag & Drop Files Here</p>
                <p>or</p>

                <input
                    type="file"
                    id="fileInput"
                    onchange="showFileName()">

                <p id="fileName">No file selected</p>

                <button onclick="uploadFile()">
                    Upload File
                </button>

            </div>

        </div>

        <!-- Details -->
        <div class="form-box">

            <input
                type="text"
                id="mediaTitle"
                placeholder="Media Title">

            <select id="mediaType">

                <option>Image</option>
                <option>Video</option>
                <option>Audio</option>

            </select>

            <textarea
                id="description"
                placeholder="Description"></textarea>

            <button onclick="startAnalysis()">
                Start AI Analysis
            </button>

        </div>

    </div>

</div>

<script>

function showFileName(){

    let file=document.getElementById("fileInput").files[0];

    if(file){

        document.getElementById("fileName").innerHTML=file.name;

    }else{

        document.getElementById("fileName").innerHTML="No file selected";

    }

}

async function uploadFile(){

    let file=document.getElementById("fileInput").files[0];

    if(!file){

        alert("Please Select File");
        return;

    }

    alert("File Selected : " + file.name);

}

async function startAnalysis(){

    let file=document.getElementById("fileInput").files[0];

    if(!file){

        alert("Please Select File");
        return;

    }

    const response=await fetch(
    "https://ai-driven-deepfake-detection-and-media.onrender.com/upload",
    {

        method:"POST",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify({

            file_name:file.name,
            file_type:document.getElementById("mediaType").value,
            media_title:document.getElementById("mediaTitle").value,
            description:document.getElementById("description").value

        })

    });

    const data=await response.json();

    alert(data.message);

    if(data.status==="success"){

        window.location.href="analysis.html";

    }

}

</script>

</body>
</html>
