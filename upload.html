<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Media - DeepfakeGuard AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <div class="sidebar">
        <h2>DeepfakeGuard</h2>

        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="upload.html">Upload Media</a>
        <a href="analysis.html">Analysis</a>
        <a href="results.html">Results</a>
        <a href="reports.html">Reports</a>
        <a href="analytics.html">Analytics</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <h1>Upload Media</h1>
        <p>Upload Image / Video for AI Analysis</p>

        <div class="upload-area">

            <input type="file" id="fileInput">

            <p id="fileName">No file selected</p>

            <button onclick="uploadFile()">Upload File</button>

        </div>

    </div>

</div>

<script>

function showFileName(){

    let file=document.getElementById("fileInput").files[0];

    if(file){

        document.getElementById("fileName").innerText=file.name;

    }else{

        document.getElementById("fileName").innerText="No file selected";

    }

}

document.getElementById("fileInput").addEventListener("change",showFileName);

async function uploadFile(){

    let file=document.getElementById("fileInput").files[0];

    if(!file){

        alert("Please Select File");

        return;

    }

    let formData=new FormData();

    formData.append("file",file);

    let response=await fetch(
    "https://ai-driven-deepfake-detection-and-media.onrender.com/upload",
    {
        method:"POST",
        body:formData
    });

    let data=await response.json();

    alert(data.message);

    if(data.status=="success"){

        window.location.href="analysis.html";

    }

}

</script>

</body>
</html>
