<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - DeepfakeGuard AI</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

.settings-container{
display:flex;
justify-content:center;
padding:30px;
}

.settings-card{
width:700px;
background:#ffffff;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.settings-card h2{
margin-bottom:25px;
color:#333;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#444;
}

.form-group input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.toggle{
display:flex;
justify-content:space-between;
align-items:center;
margin:20px 0;
}

.save-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#6c63ff;
color:white;
font-size:16px;
cursor:pointer;
font-weight:600;
}

.save-btn:hover{
background:#5148e5;
}

</style>
</head>

<body>

<div class="dashboard">

<div class="sidebar">
<h2>DeepfakeGuard</h2>

<a href="dashboard.html">Dashboard</a>
<a href="upload.html">Upload Media</a>
<a href="analysis.html">Analysis</a>
<a href="results.html">Results</a>
<a href="reports.html">Reports</a>
<a href="analytics.html">Analytics</a>
<a class="active" href="profile.html">Profile</a>
<a href="settings.html">Settings</a>
<a href="login.html" class="logout">Logout</a>

</div>

<div class="main">

<h1>Account Settings</h1>

<div class="settings-container">

<div class="settings-card">

<h2>User Preferences</h2>

<div class="form-group">
<label>Username</label>
<input type="text" value="John Doe">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" value="johndoe@gmail.com">
</div>

<div class="form-group">
<label>New Password</label>
<input type="password" placeholder="Enter new password">
</div>

<div class="toggle">
<span>Email Notifications</span>
<input type="checkbox" checked>
</div>

<div class="toggle">
<span>Dark Mode</span>
<input type="checkbox">
</div>
<input type="text" value="Administrator">

<input type="text" value="+91 9876543210">

<button onclick="saveProfile()">
Save Profile
</button>
<script>
function saveProfile(){
    alert("Profile Details Saved Successfully!");
}
</script>

<script>

fetch("http://127.0.0.1:5000/profile")
.then(response => response.json())
.then(data => {

document.getElementById("username").innerText =
data.full_name;

document.getElementById("email").innerText =
data.email;

})
.catch(error => console.log(error));

</script>


</div>

</div>

</div>

</div>

</body>
</html>
